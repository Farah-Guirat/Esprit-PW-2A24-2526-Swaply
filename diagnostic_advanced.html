<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnostic Appel Vidéo - Swaply</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { 
            max-width: 900px; 
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 { color: #333; margin-bottom: 10px; }
        .subtitle { color: #666; margin-bottom: 30px; font-size: 14px; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
        
        .card {
            background: #f9f9f9;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
        }
        .card h2 { color: #333; font-size: 16px; margin-bottom: 15px; }
        
        .stat {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            padding: 10px;
            background: white;
            border-radius: 5px;
            border-left: 3px solid #667eea;
        }
        .stat-label { font-weight: 600; }
        .stat-value { color: #667eea; font-weight: 700; font-size: 18px; }
        
        .btn {
            display: inline-block;
            padding: 12px 20px;
            margin: 5px 0;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
        }
        .btn:hover { background: #764ba2; }
        .btn.danger { background: #dc3545; }
        .btn.danger:hover { background: #c82333; }
        .btn.success { background: #28a745; }
        .btn.success:hover { background: #218838; }
        .btn:disabled { background: #999; cursor: not-allowed; }
        
        .result {
            margin-top: 15px;
            padding: 15px;
            border-radius: 5px;
            font-size: 13px;
        }
        .result.loading { background: #e7f3ff; color: #004085; }
        .result.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .result.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .result.info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        
        .table-responsive {
            overflow-x: auto;
            margin-top: 15px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }
        table th {
            background: #667eea;
            color: white;
            padding: 10px;
            text-align: left;
        }
        table td {
            padding: 10px;
            border-bottom: 1px solid #e0e0e0;
        }
        table tr:hover { background: #f5f5f5; }
        
        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 3px;
            font-weight: 600;
            font-size: 11px;
        }
        .status-en_attente { background: #fff3cd; color: #856404; }
        .status-en_cours { background: #cfe2ff; color: #084298; }
        .status-termine { background: #d1e7dd; color: #0f5132; }
        .status-rejete { background: #f8d7da; color: #842029; }
        
        .alert {
            padding: 15px;
            border-radius: 5px;
            margin: 10px 0;
        }
        .alert.warning { background: #fff3cd; border-left: 4px solid #ffc107; color: #856404; }
        .alert.info { background: #d1ecf1; border-left: 4px solid #17a2b8; color: #0c5460; }
    </style>
</head>
<body>

<div class="container">
    <h1>🔧 Diagnostic Appel Vidéo</h1>
    <p class="subtitle">État du système et gestion des appels</p>
    
    <div class="grid">
        <!-- Statistiques -->
        <div class="card">
            <h2>📊 Statistiques</h2>
            <div class="stat">
                <span class="stat-label">Appels en attente</span>
                <span class="stat-value" id="stat-waiting">-</span>
            </div>
            <div class="stat">
                <span class="stat-label">Appels en cours</span>
                <span class="stat-value" id="stat-active">-</span>
            </div>
            <div class="stat">
                <span class="stat-label">Appels terminés</span>
                <span class="stat-value" id="stat-completed">-</span>
            </div>
            <div class="stat">
                <span class="stat-label">Appels rejetés</span>
                <span class="stat-value" id="stat-rejected">-</span>
            </div>
            <button class="btn" onclick="refreshStats()">🔄 Actualiser</button>
        </div>
        
        <!-- Actions -->
        <div class="card">
            <h2>⚙️ Actions</h2>
            <button class="btn success" onclick="cleanupAggressive()">🧹 Nettoyage Agressif (1 min+)</button>
            <button class="btn danger" onclick="cleanupAll()">💥 Supprimer TOUS les appels</button>
            <button class="btn" onclick="showDatabase()">📁 Voir les appels en BD</button>
            <button class="btn" onclick="refreshPage()">↻ Rafraîchir la page</button>
        </div>
    </div>
    
    <!-- Alertes -->
    <div id="alerts-container"></div>
    
    <!-- Résultats -->
    <div id="result-container"></div>
    
    <!-- Tableau des appels -->
    <div class="card">
        <h2>📞 Appels Récents</h2>
        <div id="calls-table-container">
            <div class="result info">Chargement...</div>
        </div>
    </div>
</div>

<script>
async function makeRequest(url, method = 'GET', body = null) {
    try {
        const options = { method };
        if (body) {
            options.body = typeof body === 'string' ? body : JSON.stringify(body);
            options.headers = { 'Content-Type': 'application/json' };
        }
        const response = await fetch(url, options);
        return await response.json();
    } catch (e) {
        console.error('Erreur requête:', e);
        return { error: e.message };
    }
}

async function refreshStats() {
    const result = document.getElementById('result-container');
    result.innerHTML = '<div class="result loading">⏳ Chargement des statistiques...</div>';
    
    const data = await makeRequest('diagnostic_video_call.php');
    
    if (data.error) {
        result.innerHTML = `<div class="result error">❌ ${data.error}</div>`;
        return;
    }
    
    // Mise à jour des statistiques
    document.getElementById('stat-waiting').textContent = data.stats?.en_attente ?? 0;
    document.getElementById('stat-active').textContent = data.stats?.en_cours ?? 0;
    document.getElementById('stat-completed').textContent = data.stats?.termine ?? 0;
    document.getElementById('stat-rejected').textContent = data.stats?.rejete ?? 0;
    
    result.innerHTML = '<div class="result success">✓ Statistiques actualisées</div>';
    showDatabase();
}

async function cleanupAggressive() {
    const result = document.getElementById('result-container');
    result.innerHTML = '<div class="result loading">⏳ Nettoyage agressif en cours...</div>';
    
    const data = await makeRequest('cleanup_aggressive.php');
    
    if (data.success) {
        result.innerHTML = `<div class="result success">
            ✓ ${data.cleaned.count} appel(s) nettoyé(s)<br>
            ${data.active_remaining} appel(s) actif(s) restant(s)
        </div>`;
    } else {
        result.innerHTML = `<div class="result error">❌ ${data.error}</div>`;
    }
    
    setTimeout(refreshStats, 500);
}

async function cleanupAll() {
    if (!confirm('⚠️  Êtes-vous SÛR?\nCela supprimera TOUS les appels vidéo.')) {
        return;
    }
    
    const result = document.getElementById('result-container');
    result.innerHTML = '<div class="result loading">⏳ Suppression complète...</div>';
    
    try {
        const pdo = await makeRequest('controller/VideoCallController.php', 'POST', 'action=deleteAll');
        
        // Alternative: Nettoyer via le formulaire
        const formData = new URLSearchParams();
        formData.append('action', 'deleteAll');
        
        const response = await fetch('controller/VideoCallController.php', {
            method: 'POST',
            body: formData
        });
        
        if (response.status === 200) {
            result.innerHTML = '<div class="result success">✓ Tous les appels supprimés</div>';
            setTimeout(refreshStats, 500);
        } else {
            result.innerHTML = '<div class="result error">❌ Erreur lors de la suppression</div>';
        }
    } catch (e) {
        result.innerHTML = `<div class="result error">❌ ${e.message}</div>`;
    }
}

async function showDatabase() {
    const container = document.getElementById('calls-table-container');
    container.innerHTML = '<div class="result loading">⏳ Chargement des appels...</div>';
    
    const data = await makeRequest('diagnostic_video_call.php');
    
    if (data.error || !data.recent_calls) {
        container.innerHTML = '<div class="result error">❌ Erreur chargement</div>';
        return;
    }
    
    if (data.recent_calls.length === 0) {
        container.innerHTML = '<div class="result info">ℹ️  Aucun appel enregistré</div>';
        return;
    }
    
    let html = `<table>
        <tr>
            <th>ID</th>
            <th>Conv.</th>
            <th>Statut</th>
            <th>Début</th>
            <th>Fin</th>
            <th>Âge</th>
        </tr>`;
    
    data.recent_calls.forEach(call => {
        const statut = call.statut || 'inconnu';
        const debut = new Date(call.date_debut || call.created_at).toLocaleTimeString('fr-FR');
        const fin = call.date_fin ? new Date(call.date_fin).toLocaleTimeString('fr-FR') : '-';
        const age = call.age_minutes !== undefined ? `${call.age_minutes}m` : '-';
        
        html += `<tr>
            <td>#${call.id_video_call}</td>
            <td>${call.id_conversation}</td>
            <td><span class="status-badge status-${statut}">${statut}</span></td>
            <td>${debut}</td>
            <td>${fin}</td>
            <td>${age}</td>
        </tr>`;
    });
    
    html += '</table>';
    container.innerHTML = html;
}

function refreshPage() {
    location.reload();
}

// Chargement initial
window.addEventListener('load', () => {
    refreshStats();
    
    // Alerte si des appels bloqués
    setTimeout(async () => {
        const data = await makeRequest('diagnostic_video_call.php');
        if (data.stats?.en_attente > 0 || data.stats?.en_cours > 0) {
            const alerts = document.getElementById('alerts-container');
            alerts.innerHTML = `<div class="alert warning">
                ⚠️  <strong>${(data.stats?.en_attente || 0) + (data.stats?.en_cours || 0)} appel(s) bloké(s)</strong>
                <br>Cliquez sur "Nettoyage Agressif" avant de tester.
            </div>`;
        }
    }, 500);
});
</script>

</body>
</html>
